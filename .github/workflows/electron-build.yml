name: Build Electron App

on:
  push:
    branches:
      - main
      - master
      - 'release/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    if: contains(github.event.head_commit.message, '[RELEASE]')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install RPM tool (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm libarchive-tools

      - name: Build Electron app
        run: npm run electron:build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.os }}
          path: |
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.msi
            dist-electron/*.deb
            dist-electron/*.rpm
            dist-electron/*.zip
          if-no-files-found: warn

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Release generada automáticamente por commit [RELEASE].
            Mensaje del commit: ${{ github.event.head_commit.message }}
          files: |
            all-artifacts/*.dmg
            all-artifacts/*.exe
            all-artifacts/*.msi
            all-artifacts/*.deb
            all-artifacts/*.rpm
            all-artifacts/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
